name: Release

# Triggered when main updates (via the auto-merge PR) or manually. Computes the next semantic
# version from conventional commits, builds the debug APK with that version, and publishes a
# GitHub Release. Debug-only: no release signing, no Play Store upload.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fetch native libs + model
        run: bash ./scripts/fetch-assets.sh

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon \
            -PversionName=${{ steps.tag.outputs.new_version }} \
            -PversionCode=${{ github.run_number }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
            "dist/LoreSpeak-v${{ steps.tag.outputs.new_version }}-debug.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: LoreSpeak v${{ steps.tag.outputs.new_version }}
          body: ${{ steps.tag.outputs.changelog }}
          files: dist/LoreSpeak-v${{ steps.tag.outputs.new_version }}-debug.apk
