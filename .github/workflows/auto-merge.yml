name: Auto Merge

# Pushes to claude/dev are merged into main (which then triggers release.yml). A direct merge is
# used instead of a PR because the default GITHUB_TOKEN cannot open pull requests.
on:
  push:
    branches: [claude/dev]

permissions:
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge claude/dev into main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main claude/dev
          if [ "$(git rev-list --count origin/main..origin/claude/dev)" -eq 0 ]; then
            echo "claude/dev has no commits ahead of main; nothing to merge."
            exit 0
          fi
          git checkout -B main origin/main
          git merge --ff-only origin/claude/dev || git merge --no-edit origin/claude/dev
          git push origin main
